<!DOCTYPE html>
<html>
<head lang="uk">
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошик Волошановича</title>
    <link rel="stylesheet" type="text/css" href="main.css" />
</head>
<body>
	<header></header>
	<main>
		<div class="grid">
			<segment class="items grid-segment">
				<table class="first-main-box">
					<thead>
						<form>
							<tr>
								<th class="find-field"><label><input type="text" name="Назва товару" placeholder="Назва товару" required></label></th>
								<!-- Я весь час думав, що ця кнопка відповідає за пошук і сортування, а не за додавання -->
								<th class="find-button"><label><button type="submit" data-tooltip="Додати продукт (або знайти)">Додати</button></label></th>
							</tr>
						</form>
					</thead>
					<tbody>
						<tr>
							<td class="item-name bought">Помідори</td>
							<td class="button-less"></td>
							<td class="item-number">2</td>
							<td class="button-more"></td>
							<td class="button-bought"><label><button class="not-bought-button" data-tooltip="Скасувати покупку">Не куплено</button></label></td>
						</tr>
						<tr>
							<td class="item-name">Печиво</td>
							<td class="button-less"><label><button data-tooltip="Зменшити кількість товару">-</button></label></td>
							<td class="item-number">2</td>
							<td class="button-more"><label><button data-tooltip="Збільшити кількість товару">+</button></label></td>
							<td class="button-bought"><label><button class="bought-button" data-tooltip="Купити">Куплено</button></label><label><button class="cancel" data-tooltip="Якась кнопка з хрестиком">X</button></label></td>
						</tr>
						<tr>
							<td class="item-name"><label><input type="text" name="Новий товар" placeholder="Новий товар"></label></td>
							<td class="button-less inactive"><label><button data-tooltip="Зменшити кількість товару">-</button></label></td>
							<td class="item-number">1</td>
							<td class="button-more"><label><button data-tooltip="Збільшити кількість товару">+</button></label></td>
							<td class="button-bought"><label><button class="bought-button" data-tooltip="Купити">Куплено</button></label><label><button class="cancel" data-tooltip="Якась кнопка з хрестиком">X</button></label></td>
						</tr>
					</tbody>
				</table>
			</segment>
			<segment class="result grid-segment">
				<table class="second-main-box">
					<tr>
						<td class="result-text">Залишилося</td>
					</tr>
					<tr class="items-left-list">
						<td class="item-left"><span class="single-item left">Печиво <span class="result-number amount">2</span></span>
							<span class="single-item left">Сир <span class="result-number amount">1</span></span></td>
					</tr>
					<tr>
						<td class="result-text">Куплено</td>
					</tr>
					<tr class="items-bought-list">
						<td><span class="single-item bought">Помідори <span class="result-bought-number amount">2</span></span></td>
					</tr>
				</table>
			</segment>
		</div>
	</main>
	<footer>
		<span class="bage"><span class="buy-list-text">Buy List<br></span>
		<span class="small-text">Created by:</span><br>
		<span class="normal-text">Yurii Voloshanovych</span></span>
	</footer>
</body>
</html>
